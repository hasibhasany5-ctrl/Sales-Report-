<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Control Center | Nugortech IT Ltd</title>
    <!-- Premium Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p: #FF6B00; --b: #00A3FF; --s: #10b981; --bg: #0b1120; --card: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.1); }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); color: white; display: flex; min-height: 100vh; overflow-x: hidden; }

        /* Sidebar */
        .sidebar { width: 280px; background: rgba(0,0,0,0.3); backdrop-filter: blur(20px); border-right: 1px solid var(--border); padding: 40px 25px; position: fixed; height: 100vh; z-index: 100; }
        .logo-box { text-align: center; margin-bottom: 40px; }
        .logo-text { font-size: 22px; font-weight: 800; color: white; margin: 0; }
        .logo-slogan { font-size: 9px; color: var(--p); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }

        .main { margin-left: 280px; width: calc(100% - 280px); padding: 40px; }

        /* Stats Row */
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 35px; }
        .stat-card { padding: 30px; border-radius: 30px; border: 1px solid var(--border); text-align: center; background: var(--card); transition: 0.3s; }
        .stat-val { font-size: 32px; font-weight: 800; color: var(--b); display: block; }
        .stat-lbl { font-size: 11px; font-weight: 700; opacity: 0.6; text-transform: uppercase; }

        /* Layout Grid */
        .grid-layout { display: grid; grid-template-columns: 1fr 2.5fr; gap: 30px; }
        .panel { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 40px; backdrop-filter: blur(15px); }

        label { font-size: 10px; font-weight: 800; color: var(--b); margin-bottom: 8px; display: block; text-transform: uppercase; }
        input, select, textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 12px; border-radius: 12px; color: white; outline: none; margin-bottom: 15px; font-size: 14px; }
        input:focus { border-color: var(--b); }

        .btn { padding: 15px; border: none; border-radius: 18px; font-weight: 800; cursor: pointer; transition: 0.3s; color: white; width: 100%; }
        .btn-assign { background: linear-gradient(to right, var(--p), var(--b)); }
        
        /* Task Cards UI */
        .task-list { max-height: 550px; overflow-y: auto; padding-right: 10px; }
        .task-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 20px; border-radius: 25px; margin-bottom: 15px; position: relative; }
        .priority-high { border-left: 5px solid var(--red); }
        .priority-normal { border-left: 5px solid var(--b); }
        
        .task-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .task-name { font-size: 16px; font-weight: 800; margin: 0; }
        .task-meta { font-size: 11px; color: #64748b; margin-top: 5px; }

        .status-pill { padding: 5px 12px; border-radius: 10px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .s-pending { background: rgba(255, 255, 255, 0.05); color: #94a3b8; }
        .s-progress { background: rgba(0, 163, 255, 0.1); color: var(--b); }
        .s-done { background: rgba(16, 185, 129, 0.1); color: var(--s); }

        .action-grid { display: flex; gap: 10px; margin-top: 15px; }
        .small-btn { padding: 8px 15px; font-size: 11px; border-radius: 8px; flex: 1; border: 1px solid var(--border); background: var(--card); color: white; cursor: pointer; }
        .btn-done { background: var(--s); border: none; color: #000; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--b); border-radius: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo-box">
        <h2 class="logo-text">NUGORTECH IT</h2>
        <p class="logo-slogan">Different Creative Think</p>
    </div>
    <div style="padding:15px; border-radius:15px; background:var(--card); border:1px solid var(--b); color:var(--b); font-weight:800; text-align:center; font-size:12px;">
        <i class="fas fa-list-check"></i> TASK COMMAND CENTER
    </div>
</div>

<div class="main">
    <div class="stat-grid">
        <div class="stat-card"><span class="stat-val" id="totalTasks">0</span><span class="stat-lbl">Assigned Tasks</span></div>
        <div class="stat-card"><span class="stat-val" id="inProgress" style="color:var(--p)">0</span><span class="stat-lbl">In Progress</span></div>
        <div class="stat-card"><span class="stat-val" id="completedTasks" style="color:var(--s)">0</span><span class="stat-lbl">Completed</span></div>
    </div>

    <div class="grid-layout">
        <!-- Task Assignment (Admin Only) -->
        <div class="panel">
            <h3 style="margin-top:0; color: var(--b); font-size: 18px;">Assign New Task</h3>
            <label>Employee Name/ID</label>
            <input type="text" id="targetEmp" placeholder="e.g. #1001 or Hasib">
            
            <label>Task Title</label>
            <input type="text" id="taskTitle" placeholder="What needs to be done?">
            
            <label>Priority Level</label>
            <select id="priority">
                <option value="Normal">Normal Priority</option>
                <option value="High">🔥 High Priority</option>
            </select>

            <label>Deadline</label>
            <input type="text" id="deadline" placeholder="e.g. Today 5:00 PM">
            
            <textarea id="details" placeholder="Additional details or instructions..." rows="3"></textarea>
            
            <button class="btn btn-assign" onclick="assignTask()"><i class="fas fa-paper-plane"></i> PUBLISH TASK</button>
        </div>

        <!-- Task Monitoring Board -->
        <div class="panel">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                <h3 style="margin:0; font-size: 18px;">Live Project Progress</h3>
                <input type="text" id="search" onkeyup="filterTasks()" placeholder="Search by Employee..." style="width:250px; margin-bottom:0;">
            </div>
            
            <div class="task-list" id="taskBoard">
                <!-- Tasks will load here -->
            </div>
        </div>
    </div>
</div>

<!-- Firebase Compat SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBrz1xvq4Fpt9-j75-gUS4d8ebqPRLmOK0", 
        databaseURL: "https://sales-report-nugortech-it-default-rtdb.firebaseio.com", 
        projectId: "sales-report-nugortech-it", 
        appId: "1:848643315031:web:e6fbf92153490ea9d31a12" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function assignTask() {
        const emp = document.getElementById('targetEmp').value;
        const title = document.getElementById('taskTitle').value;
        if(!emp || !title) return alert("Fill Name & Title!");

        const data = {
            emp: emp,
            title: title,
            priority: document.getElementById('priority').value,
            deadline: document.getElementById('deadline').value,
            details: document.getElementById('details').value,
            status: "Pending",
            assignedAt: new Date().toLocaleString()
        };

        db.ref('nugor_tasks').push(data).then(() => {
            alert("Task Assigned Live!");
            document.getElementById('taskTitle').value = "";
            document.getElementById('details').value = "";
        });
    }

    db.ref('nugor_tasks').on('value', snap => {
        const board = document.getElementById('taskBoard'); board.innerHTML = "";
        const all = snap.val();
        let total = 0, prog = 0, done = 0;

        if(all) {
            Object.keys(all).reverse().forEach(k => {
                const t = all[k];
                total++;
                if(t.status === "In Progress") prog++;
                if(t.status === "Completed") done++;

                let pClass = t.priority === "High" ? "priority-high" : "priority-normal";
                let sClass = t.status === "In Progress" ? "s-progress" : (t.status === "Completed" ? "s-done" : "s-pending");

                board.innerHTML += `
                    <div class="task-card ${pClass}">
                        <div class="task-header">
                            <div>
                                <h4 class="task-name">${t.title}</h4>
                                <div class="task-meta">Assigned to: <strong>${t.emp}</strong> | Deadline: ${t.deadline}</div>
                            </div>
                            <span class="status-pill ${sClass}">${t.status}</span>
                        </div>
                        <p style="font-size:12px; color:#94a3b8; margin:10px 0;">${t.details || 'No extra details provided.'}</p>
                        
                        <div class="action-grid">
                            <button class="small-btn" onclick="updateTask('${k}', 'In Progress')">Start</button>
                            <button class="small-btn btn-done" onclick="updateTask('${k}', 'Completed')">Complete</button>
                            <button class="small-btn" style="border-color:red; color:red;" onclick="delTask('${k}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
        }
        document.getElementById('totalTasks').innerText = total;
        document.getElementById('inProgress').innerText = prog;
        document.getElementById('completedTasks').innerText = done;
    });

    function updateTask(k, s) { db.ref('nugor_tasks/'+k).update({ status: s }); }
    function delTask(k) { if(prompt("Pass: 8087") === "8087") db.ref('nugor_tasks/'+k).remove(); }
    
    function filterTasks() {
        const val = document.getElementById('search').value.toUpperCase();
        const cards = document.getElementsByClassName('task-card');
        for (let c of cards) { c.style.display = c.innerText.toUpperCase().includes(val) ? "" : "none"; }
    }
</script>
</body>
</html>
