<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Lead Hub | Nugortech IT Ltd</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #FF6B00; --b: #00A3FF; --s: #10b981; --bg: #0b0f19; --card: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.1); }
        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { margin: 0; background: var(--bg); color: white; display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar { width: 280px; background: rgba(0,0,0,0.3); backdrop-filter: blur(20px); border-right: 1px solid var(--border); padding: 50px 30px; position: fixed; height: 100vh; }
        .main { margin-left: 280px; width: calc(100% - 280px); padding: 40px; }

        /* Summary Cards */
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 35px; }
        .stat-card { padding: 25px; border-radius: 25px; border: 1px solid var(--border); text-align: center; background: var(--card); transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .stat-val { font-size: 28px; font-weight: 800; display: block; margin-bottom: 5px; color: var(--b); }
        .stat-lbl { font-size: 10px; font-weight: 700; opacity: 0.6; text-transform: uppercase; }

        /* Form & List Layout */
        .grid-layout { display: grid; grid-template-columns: 1fr 2.5fr; gap: 25px; }
        .panel { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 35px; backdrop-filter: blur(10px); }

        input, select, textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 14px; border-radius: 15px; color: white; outline: none; margin-bottom: 15px; font-size: 14px; }
        input:focus { border-color: var(--b); }

        .btn-sync { width: 100%; padding: 15px; background: linear-gradient(to right, var(--p), var(--b)); border: none; border-radius: 18px; color: white; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 15px; }
        .btn-sync:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(255, 107, 0, 0.4); }

        /* Master Lead Table */
        .table-wrap { max-height: 500px; overflow-y: auto; border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 15px; font-size: 10px; color: #64748b; text-transform: uppercase; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: #0b0f19; }
        td { padding: 15px 10px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 13px; font-weight: 600; }
        
        .badge { padding: 5px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .b-chat { background: rgba(0, 163, 255, 0.1); color: var(--b); }
        .b-hot { background: rgba(255, 107, 0, 0.1); color: var(--p); }
        .b-done { background: rgba(16, 185, 129, 0.1); color: #10b981; }

        .wa-btn { color: #25D366; text-decoration: none; font-size: 18px; transition: 0.3s; }
        .wa-btn:hover { transform: scale(1.3); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--b); border-radius: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="text-align:center; margin-bottom:50px;">
        <h2 style="margin:0; font-weight:800; color:white;">NUGORTECH IT</h2>
        <p style="color:var(--p); font-size:10px; font-weight:800; letter-spacing:1px;">DIFFERENT CREATIVE THINK</p>
    </div>
    <div style="padding:15px; border-radius:15px; background:var(--card); border:1.5px solid var(--b); color:var(--b); font-weight:800; text-align:center;">
        <i class="fab fa-whatsapp"></i> MASTER INBOX
    </div>
</div>

<div class="main">
    <div class="stat-grid">
        <div class="stat-card"><span class="stat-val" id="tLeads">0</span><span class="stat-lbl">Today's Leads</span></div>
        <div class="stat-card"><span class="stat-val" id="hLeads">0</span><span class="stat-lbl">Hot Possibilities</span></div>
        <div class="stat-card"><span class="stat-val" id="cLeads">0</span><span class="stat-lbl">Confirmed Sales</span></div>
        <div class="stat-card"><span class="stat-val" id="tStaff">0</span><span class="stat-lbl">Active Staff</span></div>
    </div>

    <div class="grid-layout">
        <!-- Lead Submission Panel -->
        <div class="panel">
            <h3 style="margin-top:0; color: var(--b);">Sync WhatsApp Lead</h3>
            <label style="font-size:10px; color:var(--b); font-weight:800;">EXECUTIVE NAME</label>
            <input type="text" id="staffName" placeholder="Your Name">
            
            <label style="font-size:10px; color:var(--b); font-weight:800;">CLIENT WHATSAPP NO.</label>
            <input type="number" id="clientPhone" placeholder="017XXXXXXXX">
            
            <label style="font-size:10px; color:var(--b); font-weight:800;">LEAD STATUS</label>
            <select id="statusSelect">
                <option value="Chatting">Ongoing Chat</option>
                <option value="Hot Lead">Hot Lead (Urgent)</option>
                <option value="Paid/Done">Payment Done</option>
                <option value="Closed">Not Interested</option>
            </select>
            
            <textarea id="notes" placeholder="Short Message Summary..." rows="4"></textarea>
            <button class="btn-sync" onclick="syncLead()"><i class="fas fa-cloud-upload-alt"></i> SYNC TO MASTER INBOX</button>
        </div>

        <!-- Master Admin Monitor -->
        <div class="panel">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                <h3 style="margin:0;">Live Monitoring Board</h3>
                <input type="text" id="find" onkeyup="filter()" placeholder="Search Staff or Customer..." style="width:250px; margin-bottom:0;">
            </div>
            <div class="table-wrap">
                <table id="waTable">
                    <thead>
                        <tr><th>Time</th><th>Executive</th><th>Customer</th><th>Phone</th><th>Status</th><th>Action</th></tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBrz1xvq4Fpt9-j75-gUS4d8ebqPRLmOK0", 
        databaseURL: "https://sales-report-nugortech-it-default-rtdb.firebaseio.com", 
        projectId: "sales-report-nugortech-it", 
        appId: "1:848643315031:web:e6fbf92153490ea9d31a12" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function syncLead() {
        const phone = document.getElementById('clientPhone').value;
        const name = document.getElementById('staffName').value;
        if(!phone || !name) return alert("Fill Name & Number!");

        const data = {
            staff: name,
            phone: phone,
            status: document.getElementById('statusSelect').value,
            msg: document.getElementById('notes').value,
            time: new Date().toLocaleTimeString(),
            date: new Date().toLocaleDateString('en-GB').replace(/\//g, "-")
        };

        db.ref('whatsapp_leads').push(data).then(() => {
            alert("Lead Synced!");
            document.getElementById('clientPhone').value = "";
            document.getElementById('notes').value = "";
        });
    }

    db.ref('whatsapp_leads').on('value', snap => {
        const tbody = document.getElementById('tbody'); tbody.innerHTML = "";
        const all = snap.val();
        let total = 0, hot = 0, confirmed = 0, staffSet = new Set();
        const today = new Date().toLocaleDateString('en-GB').replace(/\//g, "-");

        if(all) {
            Object.keys(all).reverse().forEach(k => {
                const d = all[k];
                if(d.date === today) total++;
                staffSet.add(d.staff);
                if(d.status === "Hot Lead") hot++;
                if(d.status === "Paid/Done") confirmed++;

                let badge = d.status === "Hot Lead" ? "b-hot" : (d.status === "Paid/Done" ? "b-done" : "b-chat");

                tbody.innerHTML += `<tr>
                    <td style="font-size:10px; opacity:0.6;">${d.time}<br>${d.date}</td>
                    <td style="color:var(--p)">${d.staff}</td>
                    <td>Client: ${d.phone.slice(-4)}</td>
                    <td><a href="https://wa.me/88${d.phone}" target="_blank" class="wa-btn"><i class="fab fa-whatsapp"></i> ${d.phone}</a></td>
                    <td><span class="badge ${badge}">${d.status}</span></td>
                    <td><button onclick="del('${k}')" style="background:none; border:none; color:red; cursor:pointer;"><i class="fas fa-trash"></i></button></td>
                </tr>`;
            });
        }
        document.getElementById('tLeads').innerText = total;
        document.getElementById('hLeads').innerText = hot;
        document.getElementById('cLeads').innerText = confirmed;
        document.getElementById('tStaff').innerText = staffSet.size;
    });

    function filter() {
        const val = document.getElementById('find').value.toUpperCase();
        const rows = document.getElementById('tbody').getElementsByTagName('tr');
        for (let r of rows) { r.style.display = r.innerText.toUpperCase().includes(val) ? "" : "none"; }
    }

    function del(k) { if(prompt("Pass: 8087") === "8087") db.ref('whatsapp_leads/'+k).remove(); }
</script>
</body>
</html>
