<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Call Analytics | Nugortech Boss Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: #050810; font-family: 'Plus Jakarta Sans', sans-serif; color: white; }</style>
</head>
<body class="p-10">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-8 bg-white/5 p-6 rounded-3xl border border-white/10">
            <div>
                <h1 class="text-3xl font-black">Call Monitoring Hub</h1>
                <p class="text-xs text-blue-400 font-bold uppercase tracking-widest mt-1">Nugortech IT Ltd</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] opacity-50 uppercase font-bold">Total Daily Follow-ups</p>
                <p id="tCount" class="text-4xl font-black text-orange-500">0</p>
            </div>
        </header>

        <div class="bg-white/5 border border-white/10 p-8 rounded-[40px] backdrop-blur-xl shadow-2xl">
            <div class="flex justify-between mb-8">
                <input type="text" id="find" onkeyup="filter()" placeholder="Search Staff, Date or Customer Type..." class="bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500 w-1/3 text-sm">
                <div class="flex gap-4">
                    <button onclick="exportCSV()" class="bg-blue-600 px-6 py-2 rounded-xl text-xs font-bold uppercase">Export Excel</button>
                    <button onclick="wipe()" class="bg-red-600/20 text-red-500 px-6 py-2 rounded-xl text-xs font-bold uppercase">Clear (8087)</button>
                </div>
            </div>
            
            <div class="overflow-x-auto max-h-[600px]">
                <table id="callTable" class="w-full text-left">
                    <thead class="sticky top-0 bg-[#050810] border-b border-white/10">
                        <tr class="text-[10px] text-slate-500 uppercase">
                            <th class="p-4">Date/Time</th>
                            <th class="p-4">Executive</th>
                            <th class="p-4">Client Info</th>
                            <th class="p-4">Type</th>
                            <th class="p-4">Remarks</th>
                            <th class="p-4">Del</th>
                        </tr>
                    </thead>
                    <tbody id="tbody" class="text-sm"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyBrz1xvq4Fpt9-j75-gUS4d8ebqPRLmOK0", databaseURL: "https://sales-report-nugortech-it-default-rtdb.firebaseio.com", projectId: "sales-report-nugortech-it", appId: "1:848643315031:web:e6fbf92153490ea9d31a12" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('customer_calls').on('value', snap => {
            const tbody = document.getElementById('tbody'); tbody.innerHTML = "";
            let count = 0; const today = new Date().toLocaleDateString('en-GB').replace(/\//g, "-");
            if(snap.val()) {
                Object.keys(snap.val()).reverse().forEach(k => {
                    const d = snap.val()[k];
                    if(d.date === today) count++;

                    let badgeColor = d.type === 'Regular' ? 'bg-green-500/10 text-green-500' : (d.type === 'Irregular' ? 'bg-red-500/10 text-red-500' : 'bg-yellow-500/10 text-yellow-500');

                    tbody.innerHTML += `<tr class="border-b border-white/5 hover:bg-white/5">
                        <td class="p-4 opacity-50 text-[10px]">${d.date}<br>${d.time}</td>
                        <td class="p-4 font-bold text-orange-500 uppercase">${d.staff}</td>
                        <td class="p-4 font-bold">${d.client}<br><span class="text-blue-400 font-medium">${d.phone}</span></td>
                        <td class="p-4"><span class="px-2 py-1 rounded-md text-[9px] font-black uppercase ${badgeColor}">${d.type}</span></td>
                        <td class="p-4 opacity-70 italic text-xs max-w-xs">${d.remarks}</td>
                        <td class="p-4"><button onclick="del('${k}')" class="text-slate-700 hover:text-red-500"><i class="fas fa-trash"></i></button></td>
                    </tr>`;
                });
            }
            document.getElementById('tCount').innerText = count;
        });

        function filter() {
            const val = document.getElementById('find').value.toUpperCase();
            const rows = document.getElementById('tbody').getElementsByTagName('tr');
            for (let r of rows) { r.style.display = r.innerText.toUpperCase().includes(val) ? "" : "none"; }
        }
        function del(k) { if(prompt("8087 PIN?") === "8087") db.ref('customer_calls/'+k).remove(); }
        function wipe() { if(prompt("8087 PIN?") === "8087") db.ref('customer_calls').remove(); }
        function exportCSV() {
            let csv = "Date,Time,Executive,Client,Phone,Type,Remarks\n";
            document.querySelectorAll("#callTable tr").forEach((row, i) => {
                if(i === 0) return;
                let cols = row.querySelectorAll("td");
                let rowData = Array.from(cols).slice(0, 5).map(c => c.innerText.replace(/\n/g, " "));
                rowData.push(cols[5].innerText);
                csv += rowData.join(",") + "\n";
            });
            let blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            let link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "Call_Report.csv"; link.click();
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</body>
</html>
