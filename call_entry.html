<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Call Entry | Nugortech IT Ltd</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b1120; font-family: 'Plus Jakarta Sans', sans-serif; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        input, select, textarea { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; font-size: 12px !important; padding: 10px !important; border-radius: 10px !important; width: 100%; outline: none; }
        input:focus, select:focus { border-color: #00A3FF !important; }
        th { font-size: 10px; color: #64748b; text-transform: uppercase; padding: 10px; text-align: left; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black tracking-tight">NUGORTECH <span class="text-blue-500">IT</span></h1>
            <p class="text-[10px] text-orange-500 font-bold uppercase tracking-[0.3em] mt-2">Daily 5-Call Follow-up Portal</p>
        </div>

        <div class="glass p-8 rounded-[40px] shadow-2xl">
            <!-- Executive Info -->
            <div class="mb-8 max-w-sm">
                <label class="text-[10px] font-bold text-blue-400 ml-2 uppercase">Executive Name</label>
                <input type="text" id="staffName" placeholder="Enter Your Name" class="mt-1">
            </div>

            <!-- Bulk Entry Table -->
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr>
                            <th width="5%">#</th>
                            <th width="20%">Client Name</th>
                            <th width="15%">Phone Number</th>
                            <th width="20%">Customer Type</th>
                            <th width="40%">Remarks (Conversation Details)</th>
                        </tr>
                    </thead>
                    <tbody id="callRows">
                        <!-- 5 Rows for Bulk Entry -->
                        <script>
                            for(let i=1; i<=5; i++) {
                                document.write(`
                                    <tr class="call-entry-row">
                                        <td class="p-2 text-slate-500 font-bold">${i}</td>
                                        <td class="p-2"><input type="text" class="c-name" placeholder="Name"></td>
                                        <td class="p-2"><input type="number" class="c-phone" placeholder="017..."></td>
                                        <td class="p-2">
                                            <select class="c-type">
                                                <option value="Regular">Regular (নিমিত)</option>
                                                <option value="Irregular">Irregular (অনিয়মিত)</option>
                                                <option value="Occasional">Occasional Service (মাঝে মাঝে নেয়)</option>
                                            </select>
                                        </td>
                                        <td class="p-2"><textarea class="c-notes" rows="1" placeholder="What happened on call?"></textarea></td>
                                    </tr>
                                `);
                            }
                        </script>
                    </tbody>
                </table>
            </div>

            <div class="mt-10 flex justify-center">
                <button onclick="submitBulkCalls()" class="bg-gradient-to-r from-orange-600 to-blue-600 px-12 py-4 rounded-2xl font-black uppercase text-sm shadow-xl hover:scale-[1.05] transition-all">
                    Sync All 5 Records to Hub
                </button>
            </div>
            <p id="status" class="mt-6 text-center font-bold text-sm"></p>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyBrz1xvq4Fpt9-j75-gUS4d8ebqPRLmOK0", databaseURL: "https://sales-report-nugortech-it-default-rtdb.firebaseio.com", projectId: "sales-report-nugortech-it", appId: "1:848643315031:web:e6fbf92153490ea9d31a12" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        async function submitBulkCalls() {
            const staff = document.getElementById('staffName').value;
            if(!staff) return alert("Executive Name is required!");

            const rows = document.querySelectorAll('.call-entry-row');
            let promises = [];
            const date = new Date().toLocaleDateString('en-GB').replace(/\//g, "-");
            const time = new Date().toLocaleTimeString();

            rows.forEach(row => {
                const name = row.querySelector('.c-name').value;
                const phone = row.querySelector('.c-phone').value;
                const type = row.querySelector('.c-type').value;
                const remarks = row.querySelector('.c-notes').value;

                // শুধু সেই রোগুলো সেভ হবে যেগুলোতে নাম আর ফোন আছে
                if(name && phone) {
                    const data = { staff, client: name, phone, type, remarks, time, date };
                    promises.push(db.ref('customer_calls').push(data));
                }
            });

            if(promises.length === 0) return alert("Please fill at least one client info!");

            document.getElementById('status').innerText = "⏳ Syncing with Cloud...";
            
            Promise.all(promises).then(() => {
                document.getElementById('status').className = "mt-6 text-center font-bold text-sm text-green-500";
                document.getElementById('status').innerText = "✅ All Records Submitted Successfully!";
                // ফর্ম ক্লিয়ার করা
                document.querySelectorAll('.c-name, .c-phone, .c-notes').forEach(i => i.value = "");
            }).catch(err => alert("Error: " + err.message));
        }
    </script>
</body>
</html>
