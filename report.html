<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nugortech Master Report | Automatic</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --orange: #FF6B00; --blue: #00A3FF; --green: #10b981; --red: #f43f5e; --bg: #0b1120; --card: rgba(255,255,255,0.03); }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }

        .sidebar { width: 280px; background: rgba(0,0,0,0.3); backdrop-filter: blur(20px); border-right: 1px solid var(--border); padding: 40px 25px; position: fixed; height: 100vh; z-index: 100; }
        .main { margin-left: 280px; width: calc(100% - 280px); padding: 40px; }

        .panel { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 35px; backdrop-filter: blur(15px); margin-bottom: 30px; display: flex; gap: 20px; align-items: flex-end; }
        label { display: block; font-size: 10px; font-weight: 800; color: var(--blue); margin-bottom: 8px; text-transform: uppercase; }
        input { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 12px; border-radius: 12px; color: white; outline: none; width: 200px; }
        .btn-gen { padding: 12px 30px; background: linear-gradient(135deg, var(--orange), var(--blue)); border: none; border-radius: 15px; color: white; font-weight: 800; cursor: pointer; transition: 0.3s; }

        /* --- EXCEL STYLE PRINT REPORT --- */
        .report-sheet { background: white; color: #000; width: 1250px; display: none; margin: 0 auto; border: 1px solid #333; }
        .rep-top { background: #5B9BD5; color: white; padding: 20px; text-align: center; font-weight: 900; border-bottom: 2px solid #000; }
        .rep-top h1 { margin: 0; font-size: 28px; text-transform: uppercase; }
        
        .table-container { padding: 15px; }
        .excel-table { width: 100%; border-collapse: collapse; border: 2px solid #000; }
        .excel-table th { background: #C6E0B4; color: #000; border: 1px solid #000; padding: 8px 2px; font-size: 9px; text-transform: uppercase; font-weight: 800; }
        .excel-table td { border: 1px solid #000; padding: 10px 4px; font-size: 10px; font-weight: 800; text-align: center; vertical-align: middle; }
        
        .name-col { text-align: left !important; padding-left: 10px !important; background: #fff; }
        .month-side { background: #fff; border: 1px solid #000; font-size: 14px !important; }
        .abs-red { background: #FF0000 !important; color: #fff !important; }
        .total-row { background: #DDEBF7; font-weight: 900 !important; }
        .exp-box { background: #ED7D31; color: #000; font-size: 14px !important; }

        @media print { 
            @page { size: landscape; margin: 5mm; }
            body * { visibility: hidden; } 
            .report-sheet, .report-sheet * { visibility: visible; } 
            .report-sheet { position: absolute; left: 0; top: 0; width: 100%; display: block !important; border: none; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="text-align:center; margin-bottom:50px;">
        <h2 style="margin:0; font-weight:800; color:white;">NUGORTECH IT</h2>
        <p style="color:var(--orange); font-size:9px; font-weight:800; letter-spacing:1px; text-transform: uppercase;">Cloud Auto Report</p>
    </div>
</div>

<div class="main">
    <h1 style="font-weight: 800; margin-bottom:30px;">Monthly Automatic Report</h1>

    <div class="panel">
        <div>
            <label>Reporting Month (MM-YYYY)</label>
            <input type="text" id="targetMonth" placeholder="e.g. 03-2026">
        </div>
        <div>
            <label>Total Office Days</label>
            <input type="number" id="workingDays" value="26">
        </div>
        <button class="btn-gen" onclick="generateUltimateReport()">GENERATE REPORT</button>
        <button class="btn-gen" style="background:#000; border:1px solid #444" onclick="window.print()">PRINT PDF</button>
    </div>

    <!-- THE REPORT SHEET -->
    <div id="reportSheet" class="report-sheet">
        <div class="rep-top">
            <h1>Nugortech IT Ltd.</h1>
            <div style="font-size: 14px;">Monthly Staff Performance Report</div>
        </div>

        <div class="table-container">
            <table class="excel-table">
                <thead>
                    <tr>
                        <th width="15%">Employee Name</th>
                        <th width="10%">Position</th>
                        <th width="4%">Month</th>
                        <th width="7%">Total Leads</th>
                        <th width="5%">New</th>
                        <th width="5%">Old</th>
                        <th width="9%">Sales (BDT)</th>
                        <th width="6%">Calls</th>
                        <th width="6%">Working Days</th>
                        <th width="6%">Attendance</th>
                        <th class="abs-red" width="6%">Absent</th>
                        <th width="6%">Late Count</th>
                        <th width="10%">Total Exp.</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
                <tfoot id="tfoot"></tfoot>
            </table>
        </div>
        
        <div style="margin-top:60px; display:flex; justify-content:space-between; padding: 0 60px;">
            <div style="text-align:center; width:180px; border-top:1.5px solid #000; padding-top:5px; font-size:10px; font-weight:800;">Accountant Signature</div>
            <div style="text-align:center; width:180px; border-top:1.5px solid #000; padding-top:5px; font-size:10px; font-weight:800;">Director Signature</div>
        </div>
    </div>
</div>

<!-- Firebase Compat SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyB-AWYawVDTCAX0_ocZYQMqUI5ZteoDsIg", databaseURL: "https://sales-report-nugortech-it-default-rtdb.firebaseio.com", projectId: "sales-report-nugortech-it", appId: "1:799184024638:web:82a23c732c074d98e80d6f" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    async function generateUltimateReport() {
        let monthInput = document.getElementById('targetMonth').value;
        const totalOfficeDays = Number(document.getElementById('workingDays').value);
        if(!monthInput) return alert("Please enter Month!");

        // Normalize month (e.g. 3-2026 to 03-2026)
        let parts = monthInput.split('-');
        if(parts[0].length === 1) parts[0] = '0' + parts[0];
        let searchMonth = parts.join('-'); 

        // Fetch Data
        const snaps = await Promise.all([
            db.ref('sales_reports').once('value'),
            db.ref('attendance').once('value'),
            db.ref('nugor_ledger_final_v7').once('value')
        ]);

        const sales = snaps[0].val() || {};
        const attendance = snaps[1].val() || {};
        const ledger = snaps[2].val() || {};

        let empMap = {}; 
        let monthlyExp = 0;

        // 1. Calculate Monthly Expenses
        Object.values(ledger).forEach(d => {
            if(d.date && d.date.includes(searchMonth)) monthlyExp += Number(d.amount || 0);
        });

        // 2. Aggregate Sales Reports
        Object.values(sales).forEach(d => {
            if(d.date && d.date.includes(searchMonth)) {
                if(!empMap[d.id]) empMap[d.id] = { name: d.name, leads: 0, new: 0, old: 0, sales: 0, calls: 0, attend: 0, late: 0 };
                empMap[d.id].leads += Number(d.lead || 0);
                empMap[d.id].new += Number(d.newC || 0);
                empMap[d.id].old += Number(d.oldC || 0);
                empMap[d.id].sales += Number(d.sales || 0);
                empMap[d.id].calls += Number(d.call || 0);
            }
        });

        // 3. Process Attendance (Smart Check)
        // Date format in DB: DD-MM-YYYY
        Object.keys(attendance).forEach(dateKey => {
            const dateParts = dateKey.split('-'); 
            if(dateParts.length === 3) {
                const dbMonthYear = dateParts[1] + '-' + dateParts[2]; // extracting MM-YYYY
                if(dbMonthYear === searchMonth) {
                    Object.keys(attendance[dateKey]).forEach(id => {
                        if(!empMap[id]) {
                            empMap[id] = { name: attendance[dateKey][id].name || "Staff", leads: 0, new: 0, old: 0, sales: 0, calls: 0, attend: 0, late: 0 };
                        }
                        empMap[id].attend++;
                        
                        const record = attendance[dateKey][id];
                        let isLate = record.attendanceStatus === "Late" || record.status === "Late";
                        
                        // Fallback: Check time manually if status is missing
                        if(!isLate && record.inTime) {
                            const [time, mod] = record.inTime.split(' ');
                            if(time) {
                                let [h, m] = time.split(':');
                                if(mod === 'PM' && h !== '12') h = parseInt(h) + 12;
                                if(parseInt(h) > 9 || (parseInt(h) === 9 && parseInt(m) > 30)) isLate = true;
                            }
                        }
                        if(isLate) empMap[id].late++;
                    });
                }
            }
        });

        // Build HTML
        const tbody = document.getElementById('tbody'); tbody.innerHTML = "";
        let h="", sl=1;
        let sumL=0, sumN=0, sumO=0, sumS=0, sumC=0, sumAt=0, sumAb=0, sumLt=0;
        const ids = Object.keys(empMap);

        if(ids.length === 0) return alert("No Data Found for this month!");

        ids.forEach((id, idx) => {
            const e = empMap[id];
            const absent = Math.max(0, totalOfficeDays - e.attend);
            
            sumL+=e.leads; sumN+=e.new; sumO+=e.old; sumS+=e.sales; sumC+=e.calls; sumAt+=e.attend; sumAb+=absent; sumLt+=e.late;

            h += `<tr>
                <td class="name-col">${e.name.toUpperCase()}</td>
                <td>STAFF</td>
                ${idx === 0 ? `<td rowspan="${ids.length}" class="month-side"><div style="transform: rotate(-90deg); white-space:nowrap">${searchMonth}</div></td>` : ''}
                <td>${e.leads}</td>
                <td>${e.new}</td>
                <td>${e.old}</td>
                <td>৳${e.sales.toLocaleString()}</td>
                <td>${e.calls}</td>
                <td>${totalOfficeDays}</td>
                <td>${e.attend}</td>
                <td class="abs-red">${absent}</td>
                <td>${e.late}</td>
                ${idx === 0 ? `<td rowspan="${ids.length}" class="exp-box">৳${monthlyExp.toLocaleString()}</td>` : ''}
            </tr>`;
        });

        tbody.innerHTML = h;
        document.getElementById('tfoot').innerHTML = `<tr class="total-row"><td colspan="2">TOTAL</td><td></td><td>${sumL}</td><td>${sumN}</td><td>${sumO}</td><td>৳${sumS.toLocaleString()}</td><td>${sumC}</td><td>${totalOfficeDays * ids.length}</td><td>${sumAt}</td><td>${sumAb}</td><td>${sumLt}</td><td>৳${monthlyExp.toLocaleString()}</td></tr>`;
        
        document.getElementById('reportSheet').style.display = "block";
    }
</script>
</body>
</html>
