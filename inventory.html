<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Hub | Nugortech IT Ltd</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #FF6B00; --b: #00A3FF; --s: #10b981; --d: #f43f5e; --bg: #050810; --card: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.08); }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s ease; }
        body { margin: 0; background: var(--bg); color: white; display: flex; min-height: 100vh; overflow-x: hidden; }

        /* Sidebar */
        .sidebar { width: 280px; background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); border-right: 1px solid var(--border); padding: 50px 30px; position: fixed; height: 100vh; z-index: 100; }
        .main { margin-left: 280px; width: calc(100% - 280px); padding: 50px; }

        /* Stats Cards */
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { padding: 30px; border-radius: 35px; border: 1px solid var(--border); background: var(--card); text-align: center; position: relative; overflow: hidden; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,163,255,0.3); border-color: var(--b); }
        .v { font-size: 32px; font-weight: 800; display: block; color: white; margin-bottom: 5px; }
        .l { font-size: 10px; font-weight: 700; text-transform: uppercase; color: #64748b; letter-spacing: 2px; }

        /* Form & List Layout */
        .grid-layout { display: grid; grid-template-columns: 1fr 2.5fr; gap: 30px; }
        .panel { background: var(--card); border: 1px solid var(--border); padding: 35px; border-radius: 40px; backdrop-filter: blur(15px); }
        
        label { font-size: 10px; font-weight: 800; color: var(--b); margin-bottom: 8px; display: block; text-transform: uppercase; }
        input, select, textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 14px; border-radius: 15px; color: white; outline: none; margin-bottom: 15px; font-size: 14px; }
        input:focus { border-color: var(--b); }

        .btn-save { width: 100%; padding: 18px; background: linear-gradient(to right, var(--p), var(--b)); border: none; border-radius: 20px; color: white; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 14px; box-shadow: 0 10px 30px rgba(255, 107, 0, 0.2); }
        .btn-save:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(255, 107, 0, 0.4); }

        /* Asset Table UI */
        .table-wrap { max-height: 550px; overflow-y: auto; border-radius: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 15px; font-size: 10px; color: #64748b; text-transform: uppercase; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: #050810; }
        td { padding: 20px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 13px; font-weight: 600; }
        tr:hover { background: rgba(255,255,255,0.02); }
        
        .badge { padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .b-active { background: rgba(16, 185, 129, 0.1); color: var(--s); }
        .b-repair { background: rgba(244, 63, 94, 0.1); color: var(--d); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--b); border-radius: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="text-align:center; margin-bottom:50px;">
        <h2 style="margin:0; font-weight:800; letter-spacing:-1px;">Nugortech IT</h2>
        <p style="color:var(--p); font-size:9px; font-weight:800; letter-spacing:2px; text-transform: uppercase; margin-top:5px;">Asset Management</p>
    </div>
    <div style="padding:15px; border-radius:15px; background:var(--card); border:1.5px solid var(--b); color:var(--b); font-weight:800; text-align:center; font-size:12px;">
        <i class="fas fa-microchip"></i> INVENTORY HUB ACTIVE
    </div>
</div>

<div class="main">
    <div class="stat-grid">
        <div class="stat-card"><span class="v" id="tValue">৳0</span><span class="l">TOTAL ASSET VALUE</span></div>
        <div class="stat-card"><span class="v" id="tItems">0</span><span class="l">TOTAL ITEMS IN STOCK</span></div>
        <div class="stat-card"><span class="v" id="tAssigned">0</span><span class="l">CURRENTLY ASSIGNED</span></div>
    </div>

    <div class="grid-layout">
        <!-- Input Form -->
        <div class="panel">
            <h3 style="margin-top:0; color: var(--b); font-size: 18px;">Register New Asset</h3>
            <label>Item Name</label>
            <input type="text" id="aName" placeholder="e.g. MacBook Pro M2">
            
            <label>Category</label>
            <select id="aCategory">
                <option value="Laptop/Desktop">Laptop/Desktop</option>
                <option value="Monitor">Monitor</option>
                <option value="Furniture">Furniture</option>
                <option value="Peripheral (Mouse/KB)">Peripheral (Mouse/KB)</option>
                <option value="Network/Router">Network/Router</option>
                <option value="Others">Others</option>
            </select>

            <label>Serial / Tag No.</label>
            <input type="text" id="aSerial" placeholder="Unique ID">

            <label>Cost (BDT)</label>
            <input type="number" id="aCost" placeholder="Price">

            <label>Assigned To</label>
            <input type="text" id="aUser" placeholder="Employee Name / ID">
            
            <label>Warranty Expiry</label>
            <input type="text" id="aWarranty" placeholder="e.g. 12-2027">
            
            <button class="btn-save" onclick="saveAsset()"><i class="fas fa-save"></i> SAVE TO INVENTORY</button>
        </div>

        <!-- Inventory List -->
        <div class="panel">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                <h3 style="margin:0; font-size: 18px;">Master Inventory Log</h3>
                <input type="text" id="src" onkeyup="filter()" placeholder="Search Item or Employee..." style="width:250px; margin-bottom:0; font-size:12px;">
            </div>
            <div class="table-wrap">
                <table id="assetTable">
                    <thead>
                        <tr><th>Item</th><th>Category</th><th>User</th><th>Price</th><th>Warranty</th><th>Del</th></tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
            <div style="margin-top:20px; text-align:right;">
                <button onclick="wipe()" style="background:none; border:none; color:var(--d); cursor:pointer; font-size:11px; font-weight:800;">Reset Database (8087)</button>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBrz1xvq4Fpt9-j75-gUS4d8ebqPRLmOK0", 
        databaseURL: "https://sales-report-nugortech-it-default-rtdb.firebaseio.com", 
        projectId: "sales-report-nugortech-it", 
        appId: "1:848643315031:web:e6fbf92153490ea9d31a12" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function saveAsset() {
        const name = document.getElementById('aName').value;
        const cost = Number(document.getElementById('aCost').value);
        if(!name || !cost) return alert("Fill Name & Cost!");

        const data = {
            name: name,
            category: document.getElementById('aCategory').value,
            serial: document.getElementById('aSerial').value,
            cost: cost,
            user: document.getElementById('aUser').value || "In Store",
            warranty: document.getElementById('aWarranty').value,
            date: new Date().toLocaleDateString('en-GB')
        };

        db.ref('nugor_inventory').push(data).then(() => {
            alert("Asset Recorded!");
            location.reload();
        });
    }

    db.ref('nugor_inventory').on('value', snap => {
        const tbody = document.getElementById('tbody'); tbody.innerHTML = "";
        let totalVal = 0, totalItems = 0, assignedCount = 0;
        const all = snap.val();

        if(all) {
            Object.keys(all).reverse().forEach(k => {
                const d = all[k];
                totalVal += d.cost;
                totalItems++;
                if(d.user !== "In Store") assignedCount++;

                tbody.innerHTML += `<tr>
                    <td>${d.name}<br><small style="color:#64748b">${d.serial}</small></td>
                    <td><span style="color:var(--b); font-size:11px;">${d.category}</span></td>
                    <td style="color:${d.user === 'In Store' ? '#94a3b8' : 'var(--p)'}">${d.user}</td>
                    <td>৳${d.cost.toLocaleString()}</td>
                    <td style="font-size:11px; opacity:0.7;">${d.warranty}</td>
                    <td><button onclick="del('${k}')" style="background:none; border:none; color:var(--d); cursor:pointer;"><i class="fas fa-trash-alt"></i></button></td>
                </tr>`;
            });
        }
        document.getElementById('tValue').innerText = "৳" + totalVal.toLocaleString();
        document.getElementById('tItems').innerText = totalItems;
        document.getElementById('tAssigned').innerText = assignedCount;
    });

    function filter() {
        const val = document.getElementById('src').value.toUpperCase();
        const rows = document.getElementById('tbody').getElementsByTagName('tr');
        for (let r of rows) { r.style.display = r.innerText.toUpperCase().includes(val) ? "" : "none"; }
    }

    function del(k) { if(prompt("Pass: 8087") === "8087") db.ref('nugor_inventory/'+k).remove(); }
    function wipe() { if(prompt("RESET ALL? 8087") === "8087") db.ref('nugor_inventory').remove(); }
</script>
</body>
</html>
