<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Pro Mastery | Nugortech IT Ltd</title>
    
    <!-- ধাপ ১: Tailwind CSS CDN (এটি যোগ করলেই সিএসএস লেখার ঝামেলা শেষ) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- আধুনিক ফন্ট এবং আইকন -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>

<!-- ধাপ ২: Utilities (body তে ক্লাস দিয়ে ব্যাকগ্রাউন্ড সেট করা) -->
<body class="bg-[#0b1120] text-white flex justify-center items-center min-h-screen p-6">

    <!-- ধাপ ৩: Professional UI (নুগরটেক স্মার্ট বিজনেস কার্ড) -->
    <div class="relative group max-w-sm w-full">
        
        <!-- গ্লোয়িং ব্যাকগ্রাউন্ড এফেক্ট -->
        <div class="absolute -inset-0.5 bg-gradient-to-r from-[#FF6B00] to-[#00A3FF] rounded-[30px] blur opacity-30 group-hover:opacity-100 transition duration-1000 group-hover:duration-200"></div>
        
        <!-- মেইন গ্লাস কার্ড -->
        <div class="relative bg-[#0f172a] border border-white/10 p-8 rounded-[30px] leading-none flex items-center justify-start space-x-6">
            
            <div class="flex-1 text-center">
                <!-- লোগো এরিয়া -->
                <div class="mb-6 flex justify-center">
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/10">
                        <i class="fas fa-rocket text-4xl text-[#00A3FF]"></i>
                    </div>
                </div>

                <h2 class="text-2xl font-extrabold tracking-tight text-white mb-1">NUGORTECH IT</h2>
                <p class="text-[#FF6B00] text-[10px] font-bold uppercase tracking-[0.2em] mb-6">Different Creative Think</p>

                <!-- পরিসংখ্যান সেকশন (Tailwind Flexbox & Spacing) -->
                <div class="grid grid-cols-3 gap-2 py-4 border-y border-white/5 mb-6">
                    <div>
                        <p class="text-lg font-bold text-blue-400">100+</p>
                        <p class="text-[8px] text-slate-500 uppercase font-bold">Projects</p>
                    </div>
                    <div>
                        <p class="text-lg font-bold text-orange-500">20+</p>
                        <p class="text-[8px] text-slate-500 uppercase font-bold">Staff</p>
                    </div>
                    <div>
                        <p class="text-lg font-bold text-green-400">5★</p>
                        <p class="text-[8px] text-slate-500 uppercase font-bold">Rating</p>
                    </div>
                </div>

                <!-- ইন্টারেক্টিভ বাটন (Tailwind Hover & Transition) -->
                <div class="space-y-3">
                    <button class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-xl transition-all duration-300 transform hover:scale-[1.02] active:scale-95 shadow-lg shadow-blue-600/20">
                        <i class="fas fa-external-link-alt mr-2"></i> Visit Portfolio
                    </button>
                    
                    <button class="w-full bg-white/5 hover:bg-white/10 text-white font-semibold py-3 px-6 rounded-xl border border-white/10 transition-colors">
                        Contact Admin
                    </button>
                </div>

                <p class="mt-6 text-[9px] text-slate-500 font-medium italic">Empowering Digital Solutions Globally</p>
            </div>
        </div>
    </div>

</body>
</html>
