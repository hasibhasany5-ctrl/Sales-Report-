<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Payroll | Nugortech IT Ltd</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #FF6B00; --b: #00A3FF; --s: #10b981; --bg: #0f172a; --card: rgba(255,255,255,0.03); }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }
        
        .sidebar { width: 280px; background: rgba(0,0,0,0.3); backdrop-filter: blur(25px); border-right: 1px solid rgba(255,255,255,0.1); padding: 40px 25px; position: fixed; height: 100vh; }
        .main { margin-left: 280px; width: calc(100% - 280px); padding: 40px; }

        .panel { background: var(--card); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 30px; margin-bottom: 30px; }
        .input-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .input-table th { text-align: left; font-size: 11px; color: var(--b); padding: 10px; text-transform: uppercase; }
        input, select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 12px; color: white; outline: none; width: 100%; font-size: 13px; }

        .btn { padding: 12px 25px; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; transition: 0.3s; color: white; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-gen { background: linear-gradient(135deg, var(--p), var(--b)); width: 100%; font-size: 16px; margin-top: 10px; }

        /* Report Styles */
        .report-box { background: white; color: #1e293b; padding: 50px; border-radius: 30px; margin-top: 40px; display: none; }
        .report-header { text-align: center; border-bottom: 4px solid var(--b); padding-bottom: 20px; margin-bottom: 30px; }
        .report-header h1 { margin: 0; font-weight: 800; color: #0b0f19; font-size: 28px; }
        
        .final-table { width: 100%; border-collapse: collapse; }
        .final-table th { background: var(--b); color: white; padding: 15px 10px; font-size: 11px; border: 1px solid #0081cc; text-transform: uppercase; }
        .final-table td { padding: 15px 10px; border: 1px solid #e2e8f0; font-size: 13px; font-weight: 700; text-align: center; }
        
        /* Signature Style */
        .sign-area { margin-top: 80px; display: flex; justify-content: space-between; padding: 0 40px; }
        .sign-box { text-align: center; width: 220px; }
        .signature-font { font-family: 'Dancing Script', cursive; font-size: 32px; color: #1e3a8a; margin-bottom: -10px; }
        .sign-line { border-top: 2px solid #333; margin-top: 5px; padding-top: 8px; font-size: 13px; font-weight: 800; color: #333; }
        .designation { font-size: 11px; color: #64748b; font-weight: 600; text-transform: uppercase; }

        @media print { 
            body { background: white; }
            .sidebar, .panel, .btn-gen, .main-title, .action-btns { display: none !important; }
            .main { margin-left: 0; width: 100%; padding: 0; }
            .report-box { display: block !important; box-shadow: none; padding: 0; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="text-align:center; margin-bottom:50px;">
        <h2 style="margin:0; font-weight:800;">NUGORTECH IT</h2>
        <p style="color:var(--p); font-size:9px; font-weight:800; letter-spacing:1px; text-transform: uppercase;">Official Payroll</p>
    </div>
</div>

<div class="main">
    <h1 class="main-title" style="font-weight: 800; margin-bottom:30px;">Salary Management</h1>

    <div class="panel">
        <label style="color:var(--b); font-size:11px; font-weight:800;">TARGET MONTH (MM-YYYY)</label>
        <input type="text" id="targetMonth" placeholder="e.g. 03-2026" style="max-width: 300px; margin-bottom: 25px;">

        <table class="input-table">
            <thead>
                <tr><th width="30%">Name</th><th width="15%">ID</th><th width="25%">Designation</th><th width="15%">Gross</th><th width="15%">Advance</th></tr>
            </thead>
            <tbody id="inputBody">
                <tr class="emp-row">
                    <td><input type="text" class="row-name" placeholder="Full Name"></td>
                    <td><input type="number" class="row-id" placeholder="ID"></td>
                    <td>
                        <select class="row-desig">
                            <option value="SALES EXCUTATIVE">SALES EXCUTATIVE</option>
                            <option value="VIDEO & GRAPHIC DESIGNER">VIDEO & GRAPHIC DESIGNER</option>
                            <option value="WEB DEVELOPER">WEB DEVELOPER</option>
                            <option value="ACCOUNTED & HR">ACCOUNTED & HR</option>
                            <option value="META MARKETER Intern">META MARKETER Intern</option>
                            <option value="SALES WITH MANAGEMENT">SALES WITH MANAGEMENT</option>
                        </select>
                    </td>
                    <td><input type="number" class="row-gross" placeholder="BDT"></td>
                    <td><input type="number" class="row-adv" value="0"></td>
                </tr>
            </tbody>
        </table>
        
        <button class="btn btn-gen" onclick="generatePayroll()"><i class="fas fa-sync-alt"></i> GENERATE OFFICIAL REPORT</button>
    </div>

    <div id="printArea" class="report-box">
        <div class="report-header">
            <h1>Nugortech IT Ltd.</h1>
            <p>OFFICIAL SALARY SHEET</p>
            <div id="displayMonth" style="font-weight: 800; margin-top: 10px; font-size: 14px; color: #555;"></div>
        </div>

        <table class="final-table">
            <thead>
                <tr><th>SL</th><th style="text-align:left;">Name of Employee</th><th>ID</th><th>Designation</th><th>Gross</th><th>Sales</th><th>Comm (5%)</th><th>Adv.</th><th>Net Salary</th></tr>
            </thead>
            <tbody id="finalBody"></tbody>
        </table>

        <!-- Beautiful Signature Section -->
        <div class="sign-area">
            <div class="sign-box">
                <div class="signature-font">Hasib</div>
                <div class="sign-line">Accountant Signature</div>
                <div class="designation">Hasib - Accountant</div>
            </div>
            <div class="sign-box">
                <div class="signature-font">Nur Islam</div>
                <div class="sign-line">Director Signature</div>
                <div class="designation">Nur Islam - Director</div>
            </div>
        </div>

        <div class="action-btns" style="text-align: center; margin-top: 50px;">
            <button class="btn" style="background:#0b0f19" onclick="window.print()"><i class="fas fa-print"></i> Print PDF Report</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBrz1xvq4Fpt9-j75-gUS4d8ebqPRLmOK0", databaseURL: "https://sales-report-nugortech-it-default-rtdb.firebaseio.com", projectId: "sales-report-nugortech-it", appId: "1:848643315031:web:e6fbf92153490ea9d31a12" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    async function generatePayroll() {
        const month = document.getElementById('targetMonth').value;
        if(!month) return alert("Enter Month!");
        const rows = document.querySelectorAll('.emp-row');
        const finalBody = document.getElementById('finalBody');
        finalBody.innerHTML = "<tr><td colspan='9'>Calculating...</td></tr>";
        
        const salesSnap = await database.ref('sales_reports').once('value');
        const salesData = salesSnap.val() || {};
        let html = ""; let sl = 1;

        rows.forEach(row => {
            const name = row.querySelector('.row-name').value, id = row.querySelector('.row-id').value;
            const desig = row.querySelector('.row-desig').value, gross = Number(row.querySelector('.row-gross').value), adv = Number(row.querySelector('.row-adv').value || 0);
            if(!name || !id || !gross) return;

            let totalSales = 0;
            Object.values(salesData).forEach(entry => { if(entry.id == id && entry.date.includes(month)) totalSales += Number(entry.sales || 0); });

            const comm = Math.round(totalSales * 0.05);
            const net = (gross + comm) - adv;

            html += `<tr><td>${sl++}</td><td style="text-align:left;">${name.toUpperCase()}</td><td>#${id}</td><td>${desig}</td><td>${gross.toLocaleString()}</td><td style="color:#00A3FF">৳${totalSales.toLocaleString()}</td><td style="color:#FF6B00">৳${comm.toLocaleString()}</td><td style="color:#ef4444">৳${adv.toLocaleString()}</td><td style="background:#0f172a; color:#10b981;">৳${net.toLocaleString()}</td></tr>`;
        });

        document.getElementById('displayMonth').innerText = "Payroll Period: " + month;
        finalBody.innerHTML = html;
        document.getElementById('printArea').style.display = "block";
        document.getElementById('printArea').scrollIntoView({ behavior: 'smooth' });
    }
</script>
</body>
</html>
